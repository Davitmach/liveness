<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TMA Liveness Check</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@regulaforensics/vp-frontend-face-components/dist/main.js"></script>
    
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
        }

        #app-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100vw;
        }

        /* Настройка внешнего вида компонента SDK */
        face-liveness-component {
            width: 100%;
            height: 100%;
            --ra-v-camera-overlay-color: rgba(0, 0, 0, 0.7); /* Цвет вокруг круга */
            --ra-v-camera-circle-stroke-color: #007aff;    /* Цвет рамки круга */
        }

        #status-overlay {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            padding: 15px 25px;
            border-radius: 20px;
            text-align: center;
            display: none;
            z-index: 10;
        }

        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3498db;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
            vertical-align: middle;
            margin-right: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<div id="app-container">
    <face-liveness-component 
        id="liveness"
        interactive="true"
        capture-video="true"
        copyright="false">
    </face-liveness-component>

    <div id="status-overlay">
        <div class="loader"></div>
        <span id="status-text">Отправка в IDX...</span>
    </div>
</div>

<script>
    // 1. Инициализация Telegram Mini App
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand(); // Разворачиваем на весь экран

    const livenessElement = document.getElementById('liveness');
    const statusOverlay = document.getElementById('status-overlay');
    const statusText = document.getElementById('status-text');

    // 2. Слушаем результат от SDK
    livenessElement.addEventListener('face-liveness', async (event) => {
        const result = event.detail;

        // Статус 1 обычно означает успешное прохождение локального теста (движения головой)
        if (result.status === 1 && result.video) {
            handleSuccess(result.video);
        } else if (result.status === 2) {
            console.log("Проверка отменена или не удалась");
        }
    });

    // 3. Обработка полученного видео
    async function handleSuccess(videoBlob) {
        // Показываем лоадер
        statusOverlay.style.display = 'block';
        tg.HapticFeedback.notificationOccurred('success');

        console.log("Видео получено, размер:", (videoBlob.size / 1024 / 1024).toFixed(2), "MB");

        try {
            // 4. Отправка в твой бэкенд для проксирования в IDX
            const formData = new FormData();
            formData.append('video', videoBlob, 'liveness_check.mp4');
            formData.append('userId', tg.initDataUnsafe?.user?.id || 'unknown');

            // Замени URL на свой эндпоинт
            const response = await fetch('https://your-backend-api.com/idx-verify', {
                method: 'POST',
                body: formData
            });

            if (response.ok) {
                statusText.innerText = "Верификация успешна!";
                setTimeout(() => tg.close(), 2000);
            } else {
                throw new Error("IDX rejected video");
            }

        } catch (error) {
            statusText.innerText = "Ошибка верификации";
            console.error(error);
            setTimeout(() => { statusOverlay.style.display = 'none'; }, 3000);
        }
    }

    // Обработка ошибок камеры
    livenessElement.addEventListener('camera-error', (error) => {
        alert("Ошибка камеры: " + error.detail);
    });
</script>

</body>
</html>
