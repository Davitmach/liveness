<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Liveness KYC Demo</title>

<style>
body {
  margin: 0;
  background: #0f172a;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  color: white;
  font-family: sans-serif;
}

#app {
  position: relative;
  width: 320px;
}

video, canvas {
  width: 100%;
  border-radius: 16px;
  transform: scaleX(-1);
}

canvas {
  position: absolute;
  top: 0;
  left: 0;
}

#status {
  text-align: center;
  margin-top: 10px;
}

button {
  width: 100%;
  margin-top: 10px;
  padding: 10px;
  border: none;
  border-radius: 10px;
  background: #22c55e;
  color: white;
  font-size: 16px;
}
</style>
</head>

<body>

<div id="app">
  <video id="video" autoplay playsinline></video>
  <canvas id="canvas"></canvas>

  <div id="status">Нажмите старт</div>
  <button id="startBtn">Старт</button>
</div>

<script type="module">
import { FaceLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/+esm";

const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const statusText = document.getElementById("status");

let faceLandmarker;
let recorder;
let chunks = [];

// 🧠 шаги
let steps = {
  center: false,
  left: false,
  right: false,
  up: false
};

// 🎥 камера
async function initCamera() {
  const stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: "user" },
    audio: false
  });

  video.srcObject = stream;
  await video.play();

  return stream;
}

// 🧠 mediapipe
async function initFace() {
  const vision = await FilesetResolver.forVisionTasks(
    "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/wasm"
  );

  faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
    baseOptions: {
      modelAssetPath:
        "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task"
    },
    runningMode: "VIDEO"
  });
}

// 📐 центр
function isFaceCentered(face) {
  const nose = face[1];
  return (
    nose.x > 0.4 &&
    nose.x < 0.6 &&
    nose.y > 0.4 &&
    nose.y < 0.6
  );
}

// 🔄 поворот головы
function getHeadPose(face) {
  const left = face[234];
  const right = face[454];
  const nose = face[1];

  const dx = right.x - left.x;
  const center = (left.x + right.x) / 2;

  const yaw = (nose.x - center) / dx * 100;

  const pitch = (nose.y - (left.y + right.y)/2) / dx * 100;

  return { yaw, pitch };
}

// 🎨 круг
function drawProgress() {
  const cx = canvas.width / 2;
  const cy = canvas.height / 2;
  const r = 110;

  const arr = [
    steps.center,
    steps.left,
    steps.right,
    steps.up
  ];

  for (let i = 0; i < 4; i++) {
    ctx.beginPath();

    ctx.lineWidth = 8;
    ctx.strokeStyle = arr[i] ? "lime" : "rgba(255,255,255,0.3)";

    const start = (i * Math.PI / 2) - Math.PI/2;
    const end = start + Math.PI / 2;

    ctx.arc(cx, cy, r, start, end);
    ctx.stroke();
  }
}

// 💬 текст
function getInstruction() {
  if (!steps.center) return "Держите лицо по центру";
  if (!steps.left) return "Поверните голову влево";
  if (!steps.right) return "Поверните голову вправо";
  if (!steps.up) return "Посмотрите вверх";
  return "Готово ✅";
}

// 🎬 запись
function startRecording(stream) {
  recorder = new MediaRecorder(stream);
  chunks = [];

  recorder.ondataavailable = e => chunks.push(e.data);

  recorder.start();

  setTimeout(() => recorder.stop(), 5000);

  recorder.onstop = () => {
    const blob = new Blob(chunks, { type: "video/webm" });

    console.log("VIDEO:", blob);

    const form = new FormData();
    form.append("video", blob, "video.webm");

    fetch("/upload", {
      method: "POST",
      body: form
    });
  };
}

// 🔄 loop
function loop(stream) {
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  const results = faceLandmarker.detectForVideo(video, Date.now());

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (results.faceLandmarks.length > 0) {
    const face = results.faceLandmarks[0];

    const { yaw, pitch } = getHeadPose(face);

    if (isFaceCentered(face)) steps.center = true;
    if (yaw < -10) steps.left = true;
    if (yaw > 10) steps.right = true;
    if (pitch < -5) steps.up = true;

    drawProgress();
    statusText.innerText = getInstruction();
  } else {
    statusText.innerText = "Лицо не найдено";
  }

  requestAnimationFrame(() => loop(stream));
}

// 🚀 старт
document.getElementById("startBtn").onclick = async () => {
  const stream = await initCamera();
  await initFace();

  loop(stream);
  startRecording(stream);
};
</script>

</body>
</html>
