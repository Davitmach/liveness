<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>KYC Particles Liveness</title>

<style>
body {
  margin: 0;
  background: #0f172a;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  color: white;
  font-family: sans-serif;
}

#app {
  position: relative;
  width: 320px;
}

video, canvas {
  width: 100%;
  border-radius: 16px;
  transform: scaleX(-1);
}

canvas {
  position: absolute;
  top: 0;
  left: 0;
}

#status {
  text-align: center;
  margin-top: 10px;
}

button {
  width: 100%;
  margin-top: 10px;
  padding: 10px;
  border: none;
  border-radius: 10px;
  background: #22c55e;
  color: white;
  font-size: 16px;
}
</style>
</head>

<body>

<div id="app">
  <video id="video" autoplay playsinline></video>
  <canvas id="canvas"></canvas>

  <div id="status">Нажмите старт</div>
  <button id="startBtn">Старт</button>
</div>

<script type="module">
import { FaceLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/+esm";

const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const statusText = document.getElementById("status");

let faceLandmarker;

let progress = 0;
let smoothYaw = 0;

// 🎥 камера
async function initCamera() {
  const stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: "user" },
    audio: false
  });

  video.srcObject = stream;
  await video.play();
}

// 🧠 mediapipe
async function initFace() {
  const vision = await FilesetResolver.forVisionTasks(
    "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/wasm"
  );

  faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
    baseOptions: {
      modelAssetPath:
        "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task"
    },
    runningMode: "VIDEO"
  });
}

// 📐 центр
function isCentered(face) {
  const nose = face[1];
  return nose.x > 0.3 && nose.x < 0.7 && nose.y > 0.3 && nose.y < 0.7;
}

// 🔄 yaw (инвертирован из-за зеркала)
function getYaw(face) {
  const left = face[234];
  const right = face[454];
  const nose = face[1];

  const dx = right.x - left.x;
  const center = (left.x + right.x) / 2;

  return -((nose.x - center) / dx * 100);
}

// 🎨 частицы
function drawParticles(progress) {
  const cx = canvas.width / 2;
  const cy = canvas.height / 2;
  const r = Math.min(canvas.width, canvas.height) * 0.4;

  const total = 80;

  for (let i = 0; i < total; i++) {
    const t = i / total;

    const angle = (Math.PI * 2 * t) - Math.PI / 2;

    const x = cx + Math.cos(angle) * r;
    const y = cy + Math.sin(angle) * r;

    const active = t < progress;

    ctx.beginPath();
    ctx.arc(x, y, active ? 4 : 2, 0, Math.PI * 2);

    ctx.fillStyle = active ? "white" : "rgba(255,255,255,0.25)";
    ctx.fill();
  }
}

// 🔄 loop
function loop() {
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  const results = faceLandmarker.detectForVideo(video, Date.now());

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (results.faceLandmarks.length > 0) {
    const face = results.faceLandmarks[0];

    if (isCentered(face)) {
      const rawYaw = getYaw(face);

      // сглаживание
      smoothYaw = smoothYaw * 0.8 + rawYaw * 0.2;

      const yaw = smoothYaw;

      // мёртвая зона
      if (Math.abs(yaw) > 5) {
        const maxYaw = 30;
        const normalized = Math.min(Math.abs(yaw) / maxYaw, 1);

        // плавный прогресс
        progress = progress * 0.9 + normalized * 0.1;
      }

      statusText.innerText = "Плавно поворачивайте голову";
    } else {
      statusText.innerText = "Держите лицо в круге";
    }

    drawParticles(progress);

    if (progress >= 0.95) {
      statusText.innerText = "Готово ✅";
    }

  } else {
    statusText.innerText = "Лицо не найдено";
  }

  requestAnimationFrame(loop);
}

// 🚀 старт
document.getElementById("startBtn").onclick = async () => {
  await initCamera();
  await initFace();
  loop();
};
</script>

</body>
</html>
