<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Liveness KYC Demo</title>

<style>
body {
  margin: 0;
  background: #0f172a;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  color: white;
  font-family: sans-serif;
}

#app {
  position: relative;
  width: 320px;
}

video, canvas {
  width: 100%;
  border-radius: 16px;
  transform: scaleX(-1);
}

canvas {
  position: absolute;
  top: 0;
  left: 0;
}

#status {
  text-align: center;
  margin-top: 10px;
}

button {
  width: 100%;
  margin-top: 10px;
  padding: 10px;
  border: none;
  border-radius: 10px;
  background: #22c55e;
  color: white;
  font-size: 16px;
}
</style>
</head>

<body>

<div id="app">
  <video id="video" autoplay playsinline></video>
  <canvas id="canvas"></canvas>

  <div id="status">Нажмите старт</div>
  <button id="startBtn">Старт</button>
</div>

<script type="module">
import { FaceLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/+esm";

const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const statusText = document.getElementById("status");

let faceLandmarker;
let recorder;
let chunks = [];

// 🧠 шаги
let steps = {
  center: false,
  left: false,
  right: false,
  up: false
};

// 🎥 камера
async function initCamera() {
  const stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: "user" },
    audio: false
  });

  video.srcObject = stream;
  await video.play();

  return stream;
}

// 🧠 mediapipe
async function initFace() {
  const vision = await FilesetResolver.forVisionTasks(
    "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/wasm"
  );

  faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
    baseOptions: {
      modelAssetPath:
        "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task"
    },
    runningMode: "VIDEO"
  });
}

// 📐 центр
function isFaceCentered(face) {
  const nose = face[1];
  return (
    nose.x > 0.32 &&
    nose.x < 0.68 &&
    nose.y > 0.32 &&
    nose.y < 0.68
  );
}

// 🔄 поворот головы
function getHeadPose(face) {
  const left = face[234];
  const right = face[454];
  const nose = face[1];

  const dx = right.x - left.x;
  const center = (left.x + right.x) / 2;

  const yaw = (nose.x - center) / dx * 100;

  const pitch = (nose.y - (left.y + right.y)/2) / dx * 100;

  return { yaw, pitch };
}

function clamp01(x) {
  return Math.max(0, Math.min(1, x));
}

// 0..1 — насколько лицо близко к центру кадра
function centerProgress(face) {
  const nose = face[1];
  const nx = (nose.x - 0.5) * 2;
  const ny = (nose.y - 0.5) * 2;
  const dist = Math.hypot(nx, ny);
  return clamp01(1 - dist / 0.42);
}

/** Прогресс 0..1 по каждому из 4 квадрантов (по часовой от верхней точки). */
function getQuarterProgress(face, yaw, pitch) {
  if (!steps.center) {
    return [centerProgress(face), 0, 0, 0];
  }
  if (!steps.left) {
    return [1, clamp01((-yaw - 6) / 14), 0, 0];
  }
  if (!steps.right) {
    return [1, 1, clamp01((yaw - 6) / 14), 0];
  }
  if (!steps.up) {
    return [1, 1, 1, clamp01((-pitch - 2) / 12)];
  }
  return [1, 1, 1, 1];
}

// Кольцо из коротких сегментов (стиль банковского liveness)
const RING_SEGMENTS = 52;
const RING_GAP = 0.06;

function drawProgress(face, yaw, pitch) {
  const cx = canvas.width / 2;
  const cy = canvas.height / 2;
  const r = Math.min(canvas.width, canvas.height) * 0.36;
  const quarter = RING_SEGMENTS / 4;
  const stepAngle = (Math.PI * 2) / RING_SEGMENTS;
  const segSweep = stepAngle - RING_GAP;
  const strokeW = Math.max(3, r * 0.055);
  const quarterP = getQuarterProgress(face, yaw, pitch);

  ctx.lineCap = "round";

  for (let i = 0; i < RING_SEGMENTS; i++) {
    const q = Math.floor(i / quarter);
    const k = i % quarter;
    const p = quarterP[q];
    const done =
      (q === 0 && steps.center) ||
      (q === 1 && steps.left) ||
      (q === 2 && steps.right) ||
      (q === 3 && steps.up);
    const pieceOn = done || (k + 1) / quarter <= p;

    const a0 = -Math.PI / 2 + i * stepAngle + RING_GAP / 2;
    const a1 = a0 + segSweep;

    ctx.beginPath();
    ctx.lineWidth = strokeW;
    ctx.strokeStyle = pieceOn
      ? "rgba(52, 211, 153, 0.95)"
      : "rgba(255, 255, 255, 0.18)";
    ctx.arc(cx, cy, r, a0, a1);
    ctx.stroke();
  }
}

// 💬 текст
function getInstruction() {
  if (!steps.center) return "Держите лицо по центру";
  if (!steps.left) return "Поверните голову влево";
  if (!steps.right) return "Поверните голову вправо";
  if (!steps.up) return "Посмотрите вверх";
  return "Готово ✅";
}

// 🎬 запись
function startRecording(stream) {
  recorder = new MediaRecorder(stream);
  chunks = [];

  recorder.ondataavailable = e => chunks.push(e.data);

  recorder.start();

  setTimeout(() => recorder.stop(), 5000);

  recorder.onstop = () => {
    const blob = new Blob(chunks, { type: "video/webm" });

    console.log("VIDEO:", blob);

    const form = new FormData();
    form.append("video", blob, "video.webm");

    fetch("/upload", {
      method: "POST",
      body: form
    });
  };
}

// 🔄 loop
function loop(stream) {
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  const results = faceLandmarker.detectForVideo(video, Date.now());

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (results.faceLandmarks.length > 0) {
    const face = results.faceLandmarks[0];

    const { yaw, pitch } = getHeadPose(face);

    if (isFaceCentered(face)) steps.center = true;
    if (yaw < -10) steps.left = true;
    if (yaw > 10) steps.right = true;
    if (pitch < -5) steps.up = true;

    drawProgress(face, yaw, pitch);
    statusText.innerText = getInstruction();
  } else {
    statusText.innerText = "Лицо не найдено";
  }

  requestAnimationFrame(() => loop(stream));
}

// 🚀 старт
document.getElementById("startBtn").onclick = async () => {
  const stream = await initCamera();
  await initFace();

  loop(stream);
  startRecording(stream);
};
</script>

</body>
</html>
